table:
  name: oplog_oplogentryrecording
  schema: public
configuration:
  column_config:
    oplog_entry_id:
      custom_name: oplogEntryId
    recording_file:
      custom_name: recordingFile
    uploaded_by_id:
      custom_name: uploadedById
    uploaded_date:
      custom_name: uploadedDate
  custom_column_names:
    oplog_entry_id: oplogEntryId
    recording_file: recordingFile
    uploaded_by_id: uploadedById
    uploaded_date: uploadedDate
  custom_root_fields: {}
object_relationships:
  - name: oplogEntry
    using:
      foreign_key_constraint_on: oplog_entry_id
  - name: user
    using:
      foreign_key_constraint_on: uploaded_by_id
select_permissions:
  - role: manager
    permission:
      columns:
        - id
        - oplog_entry_id
        - uploaded_by_id
        - recording_file
        - uploaded_date
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - id
        - oplog_entry_id
        - uploaded_by_id
        - recording_file
        - uploaded_date
      filter:
        oplogEntry:
          log:
            project:
              _and:
                - assignments:
                    operator_id:
                      _eq: X-Hasura-User-Id
                - invites:
                    user_id:
                      _eq: X-Hasura-User-Id
                - client:
                    invites:
                      user_id:
                        _eq: X-Hasura-User-Id
    comment: ""
delete_permissions:
  - role: manager
    permission:
      filter: {}
    comment: ""
  - role: user
    permission:
      filter:
        _and:
          - uploaded_by_id:
              _eq: X-Hasura-User-Id
          - oplogEntry:
              log:
                project:
                  _or:
                    - assignments:
                        operator_id:
                          _eq: X-Hasura-User-Id
                    - invites:
                        user_id:
                          _eq: X-Hasura-User-Id
                    - client:
                        invites:
                          user_id:
                            _eq: X-Hasura-User-Id
    comment: Only allow delete if the user has access to the associated parent project and the user uploaded this recording.
