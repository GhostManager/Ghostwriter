table:
  name: oplog_oplogentryevidence
  schema: public
configuration:
  column_config:
    evidence_id:
      custom_name: evidenceId
    oplog_entry_id:
      custom_name: oplogEntryId
  custom_column_names:
    evidence_id: evidenceId
    oplog_entry_id: oplogEntryId
  custom_root_fields: {}
object_relationships:
  - name: evidence
    using:
      manual_configuration:
        column_mapping:
          evidence_id: id
        insertion_order: null
        remote_table:
          name: reporting_evidence
          schema: public
  - name: oplogEntry
    using:
      foreign_key_constraint_on: oplog_entry_id
select_permissions:
  - role: manager
    permission:
      columns:
        - evidence_id
        - id
        - oplog_entry_id
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - evidence_id
        - id
        - oplog_entry_id
      filter:
        _and:
          - evidence:
              report:
                project:
                  _or:
                    - invites:
                        user_id:
                          _eq: X-Hasura-User-Id
                    - assignments:
                        operator_id:
                          _eq: X-Hasura-User-Id
                    - client:
                        invites:
                          user_id:
                            _eq: X-Hasura-User-Id
          - oplogEntry:
              log:
                project:
                  _or:
                    - invites:
                        user_id:
                          _eq: X-Hasura-User-Id
                    - assignments:
                        operator_id:
                          _eq: X-Hasura-User-Id
                    - client:
                        invites:
                          user_id:
                            _eq: X-Hasura-User-Id
    comment: ""
delete_permissions:
  - role: manager
    permission:
      filter: {}
    comment: ""
  - role: user
    permission:
      filter:
        _and:
          - evidence:
              report:
                project:
                  _or:
                    - invites:
                        user_id:
                          _eq: X-Hasura-User-Id
                    - assignments:
                        operator_id:
                          _eq: X-Hasura-User-Id
                    - client:
                        invites:
                          user_id:
                            _eq: X-Hasura-User-Id
          - oplogEntry:
              log:
                project:
                  _or:
                    - invites:
                        user_id:
                          _eq: X-Hasura-User-Id
                    - assignments:
                        operator_id:
                          _eq: X-Hasura-User-Id
                    - client:
                        invites:
                          user_id:
                            _eq: X-Hasura-User-Id
    comment: ""
