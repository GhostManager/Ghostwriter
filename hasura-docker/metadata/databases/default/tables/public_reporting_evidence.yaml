table:
  name: reporting_evidence
  schema: public
configuration:
  column_config:
    friendly_name:
      custom_name: friendlyName
    report_id:
      custom_name: reportId
    upload_date:
      custom_name: uploadDate
    uploaded_by_id:
      custom_name: uploadedById
  custom_column_names:
    friendly_name: friendlyName
    report_id: reportId
    upload_date: uploadDate
    uploaded_by_id: uploadedById
  custom_name: evidence
  custom_root_fields: {}
object_relationships:
  - name: report
    using:
      foreign_key_constraint_on: report_id
  - name: user
    using:
      foreign_key_constraint_on: uploaded_by_id
insert_permissions:
  - role: manager
    permission:
      check: {}
      set:
        uploaded_by_id: x-hasura-User-Id
      columns:
        - caption
        - description
        - document
        - friendly_name
        - report_id
  - role: user
    permission:
      check:
        report:
          project:
            _or:
              - invites:
                  user_id:
                    _eq: X-Hasura-User-Id
              - assignments:
                  operator_id:
                    _eq: X-Hasura-User-Id
              - client:
                  invites:
                    user_id:
                      _eq: X-Hasura-User-Id
      set:
        uploaded_by_id: x-hasura-User-Id
      columns:
        - caption
        - description
        - document
        - friendly_name
        - report_id
select_permissions:
  - role: collab
    permission:
      columns:
        - caption
        - description
        - document
        - friendly_name
        - id
        - report_id
      filter:
        _and:
          - _or:
              - _exists:
                  _table:
                    name: users_user
                    schema: public
                  _where:
                    _and:
                      - id:
                          _eq: X-Hasura-User-Id
                      - is_active:
                          _eq: true
                      - _or:
                          - role:
                              _in:
                                - admin
                                - manager
                          - is_staff:
                              _eq: true
              - report:
                  project:
                    _or:
                      - invites:
                          user_id:
                            _eq: X-Hasura-User-Id
                      - assignments:
                          operator_id:
                            _eq: X-Hasura-User-Id
                      - client:
                          invites:
                            user_id:
                              _eq: X-Hasura-User-Id
          - report_id:
              _eq: X-Hasura-Collab-Report-Id
  - role: manager
    permission:
      columns:
        - caption
        - description
        - document
        - friendly_name
        - id
        - report_id
        - upload_date
        - uploaded_by_id
      filter: {}
  - role: service
    permission:
      columns:
        - caption
        - description
        - document
        - friendly_name
        - id
        - report_id
        - upload_date
        - uploaded_by_id
      filter:
        report:
          project:
            serviceTokenProjectAccesses:
              token_id:
                _eq: X-Hasura-Service-Token-Id
  - role: user
    permission:
      columns: '*'
      filter:
        report:
          project:
            _or:
              - invites:
                  user_id:
                    _eq: X-Hasura-User-Id
              - assignments:
                  operator_id:
                    _eq: X-Hasura-User-Id
              - client:
                  invites:
                    user_id:
                      _eq: X-Hasura-User-Id
update_permissions:
  - role: manager
    permission:
      columns:
        - caption
        - description
        - friendly_name
        - report_id
      filter: {}
      check: {}
  - role: user
    permission:
      columns:
        - caption
        - description
        - friendly_name
        - report_id
      filter:
        report:
          project:
            _or:
              - invites:
                  user_id:
                    _eq: X-Hasura-User-Id
              - assignments:
                  operator_id:
                    _eq: X-Hasura-User-Id
              - client:
                  invites:
                    user_id:
                      _eq: X-Hasura-User-Id
      check:
        report:
          project:
            _or:
              - invites:
                  user_id:
                    _eq: X-Hasura-User-Id
              - assignments:
                  operator_id:
                    _eq: X-Hasura-User-Id
              - client:
                  invites:
                    user_id:
                      _eq: X-Hasura-User-Id
delete_permissions:
  - role: manager
    permission:
      filter: {}
  - role: user
    permission:
      filter:
        report:
          project:
            _or:
              - invites:
                  user_id:
                    _eq: X-Hasura-User-Id
              - assignments:
                  operator_id:
                    _eq: X-Hasura-User-Id
              - client:
                  invites:
                    user_id:
                      _eq: X-Hasura-User-Id
event_triggers:
  - name: EvidenceUpdate
    definition:
      delete:
        columns: '*'
      enable_manual: false
      update:
        columns:
          - document
          - friendly_name
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 60
    webhook: '{{ACTIONS_URL_BASE}}/event/evidence/update'
    headers:
      - name: Hasura-Action-Secret
        value_from_env: HASURA_ACTION_SECRET
