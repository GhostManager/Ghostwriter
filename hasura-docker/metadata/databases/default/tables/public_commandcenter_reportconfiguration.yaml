  - role: user
    permission:
      columns:
        - default_docx_template_id
        - default_pptx_template_id
        - id
        - enable_borders
        - title_case_captions
        - border_color
        - default_cvss_version
        - evidence_image_alignment
        - figure_caption_location
        - label_figure
        - label_table
