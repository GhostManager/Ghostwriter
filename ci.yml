name: ghostwriter-ci

services:
  django:
    image: ghostwriter_ci_django:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ghostwriter
      DJANGO_SETTINGS_MODULE: config.settings.test
      HASURA_ACTION_SECRET: ci-action-secret
      POSTGRES_DB: ghostwriter
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      REDIS_URL: redis://redis:6379/0
      SPACY_MODEL: en_core_web_sm

  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_DB: ghostwriter
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ghostwriter"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis:
    image: redis:6-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30
