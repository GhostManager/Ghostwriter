name: Run Unit Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "**.mdx"
      - "**.html"
      - "**.css"
      - "DOCS/**"

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Django test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./compose/local/django/Dockerfile
          load: true
          tags: ghostwriter_ci_django:latest
          cache-from: type=gha,scope=local-django
          cache-to: type=gha,mode=max,scope=local-django

      - name: Start test dependencies
        run: docker compose -f ci.yml up -d --wait --wait-timeout 120 postgres redis

      - name: Generate coverage report
        run: |
          mkdir -p coverage/reports
          docker compose -f ci.yml run --rm django coverage run manage.py test --exclude-tag=GitHub
          docker compose -f ci.yml run --rm django coverage xml -o coverage/reports/coverage.xml

      - name: Get dependency logs
        if: failure()
        run: |
          docker compose -f ci.yml logs postgres > postgres-logs.txt
          docker compose -f ci.yml logs redis > redis-logs.txt

      - name: Upload dependency logs artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-service-logs
          path: |
            postgres-logs.txt
            redis-logs.txt

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/reports/coverage.xml

      - name: Check Codecov token availability
        id: codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [[ -n "$CODECOV_TOKEN" ]]; then
            echo "token_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "token_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage report to Codecov
        if: steps.codecov.outputs.token_available == 'true'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: codecov-ghostwriter
          fail_ci_if_error: true
          verbose: true
